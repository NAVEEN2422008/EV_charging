[client]
showErrorDetails = false
toolbarMode = "minimal"

[server]
headless = true
runOnSave = false
port = 7860
maxUploadSize = 200
enableXsrfProtection = true

[logger]
level = "warning"

[theme]
primaryColor = "#00C2FF"
backgroundColor = "#060c14"
secondaryBackgroundColor = "#091828"
textColor = "#c9d8e8"
font = "sans serif"

[browser]
gatherUsageStats = false

