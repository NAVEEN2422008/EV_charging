upstream streamlit {
    server localhost:8501;
}

upstream api {
    server localhost:5000;
}

server {
    listen 7860;
    server_name _;
    client_max_body_size 100M;

    # API routes - forward to Flask
    location /api/ {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        
        # CORS headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
        add_header 'Access-Control-Max-Age' '86400' always;
        
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # /reset endpoint - direct to API
    location /reset {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # /health endpoint - direct to API
    location /health {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    # /step endpoint - direct to API
    location /step {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # /state endpoint - direct to API
    location /state {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    # /info endpoint - direct to API
    location /info {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    # Streamlit routes - everything else
    location / {
        proxy_pass http://streamlit;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        # Streamlit WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Deny access to internal files
    location ~ /\. {
        deny all;
    }

    location ~ ~$ {
        deny all;
    }
}
