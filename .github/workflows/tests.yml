name: Tests & Validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e .
        pip install pytest pytest-cov pytest-mock flake8 black

    - name: Lint with flake8
      run: |
        # Stop build on syntax errors
        flake8 ev_charging_grid_env --count --select=E9,F63,F7,F82 --show-source --statistics
        # Warn on style issues
        flake8 ev_charging_grid_env --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Format check with black
      run: black --check ev_charging_grid_env tests --line-length=100 || true

    - name: OpenEnv validation
      run: python validate_openenv.py

    - name: Run pytest with coverage
      run: |
        pytest tests/ -v --cov=ev_charging_grid_env --cov-report=xml --cov-report=term-missing

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        flags: unittests
        fail_ci_if_error: false

    - name: Test environment stability
      run: |
        python -m pytest tests/test_stability_and_robustness.py -v --tb=short

    - name: Build Docker image
      run: docker build -t ev-charging-grid:test .

    - name: Run Docker container test
      run: |
        docker run --rm -e API_BASE_URL="https://test.example.com/v1" -e API_KEY="test-key" \
          ev-charging-grid:test python -c "
        from ev_charging_grid_env.envs.ev_charging_env import MultiAgentEVChargingGridEnv
        env = MultiAgentEVChargingGridEnv()
        obs, _ = env.reset(seed=42)
        for _ in range(10):
            action = {
                'coordinator_action': {'price_deltas': [1]*env.num_stations, 'emergency_target_station': 0},
                'station_actions': [0]*env.num_stations
            }
            obs, r, done, _, _ = env.step(action)
        print('✅ Docker container test passed')
        "

    - name: Integration test
      run: python -m pytest tests/test_integration.py -v --tb=short || echo "⚠️ Integration tests not yet implemented"

  deployment-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Check files exist
      run: |
        test -f openenv.yaml || exit 1
        test -f inference.py || exit 1
        test -f Dockerfile || exit 1
        test -f requirements.txt || exit 1
        echo "✅ All required files present"

    - name: Validate openenv.yaml
      run: |
        python -c "
        import yaml
        with open('openenv.yaml') as f:
            spec = yaml.safe_load(f)
        assert 'name' in spec
        assert 'entrypoint' in spec
        assert 'tasks' in spec
        print('✅ openenv.yaml structure valid')
        "

  code-quality:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install tools
      run: |
        pip install pylint bandit safety

    - name: Run pylint
      run: pylint ev_charging_grid_env --exit-zero --max-line-length=120 || true

    - name: Security check with bandit
      run: bandit -r ev_charging_grid_env -f json -o bandit-report.json || true

    - name: Check dependencies with safety
      run: pip install safety && safety check --json || echo "⚠️ Some security issues, but continuing"
