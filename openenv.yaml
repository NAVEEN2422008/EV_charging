name: ev-charging-grid-env
version: "1.0.0"
description: >
  Multi-Agent Reinforcement Learning for adaptive EV charging network optimization.
  Optimizes city-wide charging station load balancing, intermittent renewable 
  integration, and emergency vehicle priority management.

domain: reinforcement-learning
real_world: true
tags:
  - ev-charging
  - smart-grid
  - multi-agent-rl
  - renewable-energy
  - openenv

# ──────────────────────────────────────────────
# SYSTEM ENDPOINTS
# ──────────────────────────────────────────────
endpoints:
  reset:
    method: POST
    path: /reset
    body:
      seed:
        type: integer
        required: false
      config:
        type: object
        required: false
  step:
    method: POST
    path: /step
    body:
      action:
        type: object
        required: true
        description: Joint action dictionary for coordinator and stations
  state:
    method: GET
    path: /state

# ──────────────────────────────────────────────
# DEFINED TASKS (Validator Standard)
# ──────────────────────────────────────────────
tasks:
  - id: easy_task
    name: "Standard Grid Operation"
    difficulty: easy
    max_steps: 120
    description: >
      Basic charging grid simulation focusing on vehicle throughput and 
      solar prioritization. Achieve high solar utilization and low wait times.
    grading:
      - criterion: "Completion rate > 80%"
        weight: 0.40
        deterministic: true
      - criterion: "Solar utilization > 30%"
        weight: 0.30
        deterministic: true
      - criterion: "Average wait time < 25 steps"
        weight: 0.30
        deterministic: true

  - id: medium_task
    name: "Dynamic Pricing Coordination"
    difficulty: medium
    max_steps: 180
    description: >
      Optimize queue management using dynamic pricing signals to manage
      arrivals at 4 stations. Priority handling for emergency vehicles.
    grading:
      - criterion: "Emergency service rate > 80%"
        weight: 0.40
        deterministic: true
      - criterion: "Solar utilization > 30%"
        weight: 0.30
        deterministic: true
      - criterion: "Completion rate > 85%"
        weight: 0.30
        deterministic: true

  - id: hard_task
    name: "Grid Stability & Resilience"
    difficulty: hard
    max_steps: 240
    description: >
      Maximize solar usage and emergency response while maintaining grid
      stability during peak load events at 6 stations.
    grading:
      - criterion: "Zero grid overload events"
        weight: 0.40
        deterministic: true
      - criterion: "Solar utilization > 50%"
        weight: 0.30
        deterministic: true
      - criterion: "Emergency service rate > 95%"
        weight: 0.30
        deterministic: true

# ──────────────────────────────────────────────
# EVALUATION METRICS
# ──────────────────────────────────────────────
reward:
  range: [0.0, 1.0]
  type: float
  description: >
    Dense step-wise reward normalized to [0, 1] based on grid stability,
    energy utilization, and vehicle service quality.

baseline:
  model: gpt-4o-mini
  scores:
    easy_task: 0.88
    medium_task: 0.76
    hard_task: 0.65

# ──────────────────────────────────────────────
# INFRASTRUCTURE
# ──────────────────────────────────────────────
infrastructure:
  runtime: docker
  base_image: python:3.11-slim
  port: 7860
  health_check: GET /health
  max_runtime_minutes: 20
  memory_gb: 8
  vcpus: 2

metadata:
  license: MIT
  tags:
    - smart-city
    - sustainability
    - ai-for-good
