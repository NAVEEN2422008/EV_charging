# Submit to: HuggingFace Spaces tagged with 'openenv'
name: ev-charging-grid-env
version: "1.0.0"
description: >
  Multi-Agent EV Charging Grid Optimization Environment.
  An AI agent learns to coordinate multiple EV charging stations, optimize
  solar energy usage, manage emergency vehicle priority, and maintain grid
  stability under dynamic demand conditions.

domain: energy-management
real_world: true
tags:
  - ev-charging
  - multi-agent
  - reinforcement-learning
  - smart-grid
  - solar-energy
  - openenv

# ──────────────────────────────────────────────
endpoints:
  reset:
    method: POST
    path: /reset
    body:
      task_id:
        type: string
        required: false
        default: basic_grid_operation
        enum:
          - basic_grid_operation
          - queue_optimization
          - full_grid_management
  step:
    method: POST
    path: /step
    body:
      action:
        type: object
        required: true
        description: Coordinator and station actions for the grid
  state:
    method: GET
    path: /state

# ──────────────────────────────────────────────
action_space:
  type: object
  description: >
    Dictionary with 'coordinator_action' (price_deltas, emergency_target_station)
    and 'station_actions' (array of per-station decisions).

# ──────────────────────────────────────────────
observation_space:
  type: object
  fields:
    station_features:
      type: array
      description: Per-station features (queue, charging count, solar kw, price)
    queue_lengths:
      type: array
      description: Number of vehicles waiting at each station
    time_context:
      type: array
      description: Sine/cosine encoding of time of day
    arrivals_summary:
      type: array
      description: Normal and emergency arrival counts with energy demand
    weather:
      type: integer
      description: Current weather (0=sunny, 1=cloudy, 2=rainy)

# ──────────────────────────────────────────────
reward:
  range: [0.0, 1.0]
  type: float
  description: >
    Dense per-step reward shaped by solar utilization, vehicle throughput,
    emergency handling, and grid stability. Clipped to [0, 1] for consistency.
  partial_progress: true

# ──────────────────────────────────────────────
tasks:
  - id: basic_grid_operation
    name: Basic Grid Operation
    difficulty: easy
    max_steps: 120
    description: >
      Operate a 2-station EV charging grid under low demand.
      Maximize vehicle throughput and solar energy usage.
    grading:
      - criterion: Serves at least 60% of arriving vehicles
        weight: 0.40
        deterministic: true
      - criterion: Achieves >20% solar utilization rate
        weight: 0.35
        deterministic: true
      - criterion: Maintains average wait time below 25 timesteps
        weight: 0.25
        deterministic: true

  - id: queue_optimization
    name: Queue & Pricing Optimization
    difficulty: medium
    max_steps: 180
    description: >
      Manage a 4-station grid with dynamic pricing and emergency vehicle routing.
      Balance throughput, pricing fairness, and emergency response.
    grading:
      - criterion: Serves at least 70% of arriving vehicles
        weight: 0.35
        deterministic: true
      - criterion: Achieves >25% solar utilization rate
        weight: 0.25
        deterministic: true
      - criterion: Serves >80% of emergency vehicles within wait limit
        weight: 0.25
        deterministic: true
      - criterion: Maintains average wait time below 20 timesteps
        weight: 0.15
        deterministic: true

  - id: full_grid_management
    name: Full Grid Management
    difficulty: hard
    max_steps: 240
    description: >
      Operate a 6-station grid under high demand, frequent emergencies,
      weather variability, and station outages. Maximize solar usage and
      grid stability while minimizing overload events.
    grading:
      - criterion: Serves at least 75% of arriving vehicles
        weight: 0.25
        deterministic: true
      - criterion: Achieves >35% solar utilization rate
        weight: 0.25
        deterministic: true
      - criterion: Maintains grid overload events below 10% of steps
        weight: 0.20
        deterministic: true
      - criterion: Serves >85% of emergency vehicles without timeout
        weight: 0.15
        deterministic: true
      - criterion: Maintains average wait time below 18 timesteps
        weight: 0.15
        deterministic: true

# ──────────────────────────────────────────────
baseline:
  model: gpt-4o-mini
  scores:
    basic_grid_operation: 0.720
    queue_optimization: 0.610
    full_grid_management: 0.540
  notes: >
    Scores achieved by the baseline inference.py using deterministic
    heuristic policy with fixed action patterns and seed=42.

# ──────────────────────────────────────────────
infrastructure:
  runtime: docker
  base_image: python:3.11-slim
  port: 7860
  health_check: GET /health
  max_runtime_minutes: 20
  memory_gb: 4
  vcpus: 2
