name: ev-charging-grid
description: Multi-agent EV charging grid optimization with solar usage, queue balancing, and emergency prioritization
entrypoint: ev_charging_grid_env.envs.ev_charging_env:MultiAgentEVChargingGridEnv

tasks:
  - id: easy
    description: "Low-arrival scenario with abundant solar and grid capacity. Objective: maximize vehicle throughput while minimizing wait times."
    objective: "Achieve >85% vehicle service ratio with <8-minute average wait time"
    episode_length: 96
    parameters:
      arrival_lambda: 3.5
      emergency_probability: 0.01
      solar_multiplier: 1.15
      grid_capacity_kw: 1750
      weather_weights: [0.7, 0.2, 0.1]

  - id: medium
    description: "Moderate-arrival scenario with balanced solar generation and grid constraints. Objective: balance throughput, solar utilization, and wait times."
    objective: "Achieve >70% vehicle service ratio with >50% solar usage and <12-minute average wait time"
    episode_length: 120
    parameters:
      arrival_lambda: 7.0
      emergency_probability: 0.05
      solar_multiplier: 0.85
      grid_capacity_kw: 1300
      weather_weights: [0.45, 0.35, 0.2]

  - id: hard
    description: "High-arrival scenario with limited solar and tight grid constraints. Objective: handle emergency prioritization while optimizing energy balance."
    objective: "Achieve >60% vehicle service ratio with >40% solar usage, prioritize 95% emergency service, and manage <16-minute average wait time"
    episode_length: 144
    parameters:
      arrival_lambda: 11.0
      emergency_probability: 0.12
      solar_multiplier: 0.55
      grid_capacity_kw: 950
      weather_weights: [0.25, 0.35, 0.4]

grader:
  type: deterministic
  scoring_method: weighted_metrics
  metric_weights:
    served_ratio: 0.4
    solar_usage_ratio: 0.3
    wait_time_efficiency: 0.3
  output_range: [0.0, 1.0]

