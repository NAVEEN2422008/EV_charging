env:
  num_stations: 10
  episode_length: 300
  station_outage_probability: 0.005
  base_arrival_rate: 6.0
  emergency_arrival_prob: 0.04
  reward_clip: 50.0

training:
  total_steps: 20000
  rollout_steps: 512
  batch_size: 128
  epochs: 4
  gamma: 0.99
  gae_lambda: 0.95
  clip_coef: 0.2
  entropy_coef: 0.01
  value_coef: 0.5
  max_grad_norm: 0.5
  lr: 0.0003
  reward_norm: true
  lr_anneal: true
  min_lr_scale: 0.1
