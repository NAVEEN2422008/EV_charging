env:
  num_stations: 10
  episode_length: 300
  station_outage_probability: 0.007
  base_arrival_rate: 6.5
  emergency_arrival_prob: 0.05
  reward_clip: 50.0

training:
  total_cycles: 5000
  rollout_cycles: 256
  batch_size: 128
  epochs: 4
  gamma: 0.99
  gae_lambda: 0.95
  clip_coef: 0.2
  entropy_coef: 0.02
  value_coef: 0.5
  max_grad_norm: 0.5
  lr: 0.0003
  reward_norm: true
  lr_anneal: true
  min_lr_scale: 0.1
